<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Jethwa Bricks · HP-1</title>
    
    <!-- Bootstrap (light grid) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF & Excel libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* === balanced medium size — comfortable, not too big === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f4f7fd;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== HEADER (medium sizing) ===== */
        .app-bar {
            background: linear-gradient(135deg, #1e2f6f, #2f4593);
            color: white;
            padding: 16px 18px 20px 18px;
            border-bottom-left-radius: 36px;
            border-bottom-right-radius: 36px;
            box-shadow: 0 8px 20px rgba(30, 47, 111, 0.3);
        }

        .app-bar .top-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-bar .brand-icon {
            font-size: 2.2rem;
            color: #fee7a0;
        }

        .app-bar .brand-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .app-bar .brand-sub {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 4px;
            padding-left: 2px;
        }

        /* ===== BOTTOM TABS (medium) ===== */
        .bottom-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(140, 160, 220, 0.3);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 18px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #6f7fa9;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 0 2px;
            border-radius: 30px;
            flex: 1;
            text-decoration: none;
        }

        .tab-item i {
            font-size: 1.8rem;
            margin-bottom: 2px;
            color: #6b7fb0;
        }

        .tab-item.active {
            background: #dce5ff;
            color: #1f2f5e;
        }

        .tab-item.active i {
            color: #1f2f5e;
        }

        /* content padding for bottom nav */
        .content {
            flex: 1;
            padding: 14px 14px 80px 14px;
        }

        /* ===== CARDS (medium radius) ===== */
        .mobile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 22px 18px;
            margin-bottom: 20px;
            box-shadow: 0 16px 30px rgba(60, 80, 130, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .card-header-custom {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .card-header-custom i {
            font-size: 2rem;
            color: #2f4593;
            background: #e0e9ff;
            padding: 10px;
            border-radius: 28px;
        }

        .card-header-custom h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1e2f6f;
            margin: 0;
        }

        /* ===== FORM (medium touch targets) ===== */
        .form-label {
            font-weight: 600;
            color: #1e2f6f;
            font-size: 0.95rem;
            margin-bottom: 4px;
            padding-left: 8px;
        }

        .form-control, .form-select {
            border-radius: 36px;
            border: 2px solid #e0e9ff;
            padding: 14px 20px;
            font-size: 1rem;
            background: white;
            box-shadow: inset 0 2px 8px #ecf2ff;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2f4593;
            box-shadow: 0 0 0 4px rgba(47, 69, 147, 0.2);
            outline: none;
        }

        /* ===== BUTTONS (medium) ===== */
        .btn-app {
            border-radius: 48px;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1.3rem;
            border: none;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.1s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-save {
            background: linear-gradient(145deg, #1e2f6f, #2f4593);
            color: white;
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        .btn-reset {
            background: #e0e9ff;
            color: #1e2f6f;
        }

        .btn-reset:active {
            background: #c8d6fc;
        }

        .conditional-field {
            display: none;
        }

        /* ===== SEARCH TABLE (medium) ===== */
        .table-container {
            background: white;
            border-radius: 38px;
            padding: 12px 6px;
            box-shadow: inset 0 2px 12px #dce3fd;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            min-width: 1400px;
            font-size: 0.95rem;
            border-collapse: separate;
            border-spacing: 0 4px;
        }

        .table thead th {
            background: #b1c4ff;
            color: #17234d;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 14px 8px;
            white-space: nowrap;
            border-bottom: 3px solid white;
        }

        .table tbody td {
            background: #f9fbff;
            padding: 12px 8px;
            white-space: nowrap;
            border-radius: 20px;
        }

        .payment-cash td { background-color: #daf1da !important; }
        .payment-challan td { background-color: #fff2cf !important; }
        .payment-online td { background-color: #dae6ff !important; }

        .total-cash-row td {
            background-color: #cde3ff !important;
            font-weight: 700;
            border-top: 3px solid #3f6ef0;
        }

        /* export bar */
        .export-bar {
            background: #e2ebff;
            border-radius: 48px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
            border: 2px solid white;
            align-items: center;
        }

        .btn-export {
            background: white;
            border: 2px solid #2f4593;
            color: #1e2f6f;
            border-radius: 48px;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 1rem;
            flex: 1;
        }

        .swipe-note {
            font-size: 0.95rem;
            color: #3f5090;
            text-align: center;
            margin-top: 8px;
        }

        /* ===== POPUP (medium) ===== */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 30, 60, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .popup-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .popup-card {
            background: white;
            width: 80%;
            max-width: 340px;
            border-radius: 70px;
            padding: 35px 16px 30px;
            text-align: center;
            box-shadow: 0 30px 50px #192654;
            transform: scale(0.6);
            transition: 0.2s;
            border: 6px solid #c0f0c0;
        }

        .popup-overlay.show .popup-card {
            transform: scale(1);
        }

        .green-tick-big {
            background: #2bcc6b;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px #2bcc6b;
            animation: pop 0.3s ease;
        }

        .green-tick-big i {
            font-size: 5rem;
            color: white;
        }

        @keyframes pop {
            0% { transform: scale(0.2); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-card h3 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f401f;
            margin-bottom: 8px;
        }

        .popup-card p {
            background: #d9f0e3;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 12px 18px;
            border-radius: 60px;
            color: #0f571f;
        }

        .btn-popup-close {
            background: #ccf0cc;
            border: none;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b4b1a;
            padding: 14px 30px;
            border-radius: 60px;
            margin-top: 22px;
            box-shadow: 0 6px 0 #8fc98f;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- HEADER (medium) -->
    <div class="app-bar">
        <div class="top-row">
            <i class="fas fa-brick brand-icon"></i>
            <span class="brand-text">JETHWA <br>BRICKS · HP-1</span>
        </div>
        <div class="brand-sub">
            <i class="fas fa-hand-pointer"></i> tap to manage
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content" id="mainContent">

        <!-- ADD SALE PAGE -->
        <div id="addSalePage" class="page">
            <div class="mobile-card">
                <div class="card-header-custom">
                    <i class="fas fa-pen"></i>
                    <h2>New Sale</h2>
                </div>

                <form id="saleForm">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Date</label>
                            <input type="text" class="form-control" id="date" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Sale ID</label>
                            <input type="text" class="form-control" id="saleId" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">MC</label>
                            <input type="text" class="form-control" id="mc" value="HP-1" readonly>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Customer *</label>
                            <input type="text" class="form-control" id="customer" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Phone *</label>
                            <input type="text" class="form-control" id="phone" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" id="address">
                        </div>

                        <div class="col-6">
                            <label class="form-label">Product *</label>
                            <select class="form-select" id="product" required>
                                <option value="">Select</option>
                                <option value="I ST CL">I ST CL</option>
                                <option value="II ND CL">II ND CL</option>
                                <option value="III RD CL">III RD CL</option>
                                <option value="I ST RS">I ST RS</option>
                                <option value="II ND RS">II ND RS</option>
                                <option value="I ST JH">I ST JH</option>
                                <option value="II ND JH">II ND JH</option>
                                <option value="PATTAN">PATTAN</option>
                                <option value="GERIA">GERIA</option>
                                <option value="SOLLING">SOLLING</option>
                                <option value="KONKATA">KONKATA</option>
                                <option value="BATS">BATS</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Qty *</label>
                            <input type="number" class="form-control" id="qty" required onchange="calculateTotal()">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Rate *</label>
                            <input type="number" class="form-control" id="rate" required onchange="calculateTotal()">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Total</label>
                            <input type="text" class="form-control" id="total" readonly>
                        </div>

                        <div class="col-6">
                            <label class="form-label">Transport</label>
                            <select class="form-select" id="transport">
                                <option value="">Select</option>
                                <option value="Customer Own">Customer Own</option>
                                <option value="Choto Hati">Choto Hati</option>
                                <option value="Tractor">Tractor</option>
                                <option value="Engine Trolley">Engine Trolley</option>
                                <option value="Boro Gari">Boro Gari</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Vehicle No</label>
                            <input type="text" class="form-control" id="vehicle">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Payment *</label>
                            <select class="form-select" id="payment" required onchange="handlePaymentChange()">
                                <option value="">Select</option>
                                <option value="Cash">Cash</option>
                                <option value="Challan">Challan</option>
                                <option value="Online">Online</option>
                            </select>
                        </div>

                        <!-- conditional -->
                        <div class="col-12 conditional-field" id="memoField">
                            <label class="form-label">Memo Number</label>
                            <input type="text" class="form-control" id="memo">
                        </div>
                        <div class="col-12 conditional-field" id="challanField">
                            <label class="form-label">Challan Number</label>
                            <input type="text" class="form-control" id="challan">
                        </div>
                        <div class="col-12 conditional-field" id="accountField">
                            <label class="form-label">Account Name</label>
                            <input type="text" class="form-control" id="account">
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="button" class="btn-app btn-save" onclick="saveSale()">
                            <i class="fas fa-save"></i> SAVE
                        </button>
                        <button type="button" class="btn-app btn-reset" onclick="resetForm()">
                            <i class="fas fa-undo"></i> RESET
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- SEARCH PAGE -->
        <div id="searchPage" class="page" style="display: none;">
            <div class="mobile-card">
                <div class="card-header-custom">
                    <i class="fas fa-search"></i>
                    <h2>Search</h2>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" id="searchDate">
                    </div>
                    <div class="col-4 d-flex align-items-end">
                        <button class="btn-app btn-save" style="padding: 12px;" onclick="searchSales()">
                            <i class="fas fa-search"></i> Go
                        </button>
                    </div>
                </div>

                <!-- export -->
                <div class="export-bar" id="downloadBar" style="display: none;">
                    <span style="font-weight:600;">📤 Export:</span>
                    <button class="btn-export" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-export" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
                </div>

                <!-- table -->
                <div class="table-container">
                    <table class="table" id="salesTable">
                        <thead>
                            <tr><th>Date</th><th>Sale ID</th><th>Customer</th><th>Phone</th><th>Address</th><th>Product</th><th>Qty</th><th>Rate</th><th>MC</th><th>Total</th><th>Transport</th><th>Vehicle</th><th>Payment</th><th>Memo</th><th>Challan</th><th>Account</th></tr>
                        </thead>
                        <tbody id="tableBody"><tr><td colspan="16" style="text-align:center;">Select a date</td></tr></tbody>
                        <tfoot id="tableFoot" style="display: none;">
                            <tr class="total-cash-row"><td colspan="9" style="text-align:right;">💰 Total Cash:</td><td id="totalCashValue">₹0.00</td><td colspan="6"></td></tr>
                        </tfoot>
                    </table>
                </div>
                <div class="swipe-note"><i class="fas fa-arrows-alt-h"></i> swipe for all columns</div>
            </div>
        </div>
    </div>

    <!-- BOTTOM TABS -->
    <div class="bottom-tabs">
        <a href="#" class="tab-item active" id="tabAdd" onclick="showMobilePage('addSale'); return false;">
            <i class="fas fa-plus-circle"></i>
            <span>Add</span>
        </a>
        <a href="#" class="tab-item" id="tabSearch" onclick="showMobilePage('search'); return false;">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="congratsPopup">
        <div class="popup-card">
            <div class="green-tick-big"><i class="fas fa-check"></i></div>
            <h3>CONGRATS!</h3>
            <p>✅ Sale saved!</p>
            <button class="btn-popup-close" onclick="closePopup()">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhDW_KiShRkQFKp3gm8olmA-Rxf-BVv3XW2oJSw1VvPJwdAre1WBWJTicwdkD0BnZq/exec';
        let lastSearchResults = [];

        document.addEventListener('DOMContentLoaded', function() {
            setCurrentDate();
            getNextSaleId();
            showMobilePage('addSale');
        });

        function setCurrentDate() {
            const now = new Date();
            const formattedDate = now.toLocaleDateString('en-IN', { year:'numeric', month:'2-digit', day:'2-digit' });
            document.getElementById('date').value = formattedDate;
        }

        function showMobilePage(page) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(page + 'Page').style.display = 'block';
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if (page === 'addSale') {
                document.getElementById('tabAdd').classList.add('active');
                resetForm();
                getNextSaleId();
            } else {
                document.getElementById('tabSearch').classList.add('active');
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="16" class="text-center">Select a date</td></tr>';
                document.getElementById('tableFoot').style.display = 'none';
                document.getElementById('downloadBar').style.display = 'none';
                lastSearchResults = [];
            }
        }

        function calculateTotal() {
            const qty = parseFloat(document.getElementById('qty').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            document.getElementById('total').value = qty * rate;
        }

        function handlePaymentChange() {
            const payment = document.getElementById('payment').value;
            document.querySelectorAll('.conditional-field').forEach(f => f.style.display = 'none');
            if (payment === 'Cash') document.getElementById('memoField').style.display = 'block';
            else if (payment === 'Challan') document.getElementById('challanField').style.display = 'block';
            else if (payment === 'Online') document.getElementById('accountField').style.display = 'block';
        }

        function getNextSaleId() {
            fetch(API_URL + '?action=getNextSaleId')
                .then(r => r.json())
                .then(d => { if (d.status === 'success') document.getElementById('saleId').value = d.saleId; })
                .catch(e => console.error(e));
        }

        function showSuccessPopup() { document.getElementById('congratsPopup').classList.add('show'); }
        function closePopup() { document.getElementById('congratsPopup').classList.remove('show'); }

        function saveSale() {
            const formData = new FormData();
            formData.append('action','save');
            formData.append('saleId', document.getElementById('saleId').value);
            formData.append('customer', document.getElementById('customer').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('product', document.getElementById('product').value);
            formData.append('qty', document.getElementById('qty').value);
            formData.append('rate', document.getElementById('rate').value);
            formData.append('transport', document.getElementById('transport').value);
            formData.append('vehicle', document.getElementById('vehicle').value);
            formData.append('payment', document.getElementById('payment').value);
            formData.append('memo', document.getElementById('memo').value);
            formData.append('challan', document.getElementById('challan').value);
            formData.append('account', document.getElementById('account').value);

            fetch(API_URL, { method:'POST', body:formData })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') { showSuccessPopup(); resetForm(); getNextSaleId(); } 
                    else alert('Error: ' + data.message);
                })
                .catch(e => alert('Error: '+e));
        }

        function resetForm() {
            document.getElementById('saleForm').reset();
            document.getElementById('total').value = '';
            document.querySelectorAll('.conditional-field').forEach(f => f.style.display = 'none');
            setCurrentDate();
        }

        function searchSales() {
            const date = document.getElementById('searchDate').value;
            if (!date) { alert('Pick a date'); return; }
            fetch(API_URL + '?action=search&date=' + date)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        displaySearchResults(data.data);
                        lastSearchResults = data.data;
                        document.getElementById('downloadBar').style.display = 'flex';
                    } else {
                        alert('Error: ' + data.message);
                        lastSearchResults = [];
                        document.getElementById('downloadBar').style.display = 'none';
                    }
                })
                .catch(e => alert('Search error: ' + e));
        }

        function displaySearchResults(results) {
            const tbody = document.getElementById('tableBody');
            const foot = document.getElementById('tableFoot');
            if (!results.length) {
                tbody.innerHTML = '<tr><td colspan="16" class="text-center">No records</td></tr>';
                foot.style.display = 'none';
                return;
            }
            let html = '', totalCash = 0;
            results.forEach(row => {
                let cls = '';
                if (row.Payment === 'Cash') { cls = 'payment-cash'; totalCash += parseFloat(row.Total) || 0; }
                else if (row.Payment === 'Challan') cls = 'payment-challan';
                else if (row.Payment === 'Online') cls = 'payment-online';
                html += `<tr class="${cls}"><td>${row.Date||''}</td><td>${row['Sale ID']||''}</td><td>${row.Customer||''}</td><td>${row.Phone||''}</td><td>${row.Address||''}</td><td>${row.Product||''}</td><td>${row.Qty||''}</td><td>${row.Rate||''}</td><td>${row.MC||''}</td><td>${row.Total||''}</td><td>${row.Transport||''}</td><td>${row.Vehicle||''}</td><td>${row.Payment||''}</td><td>${row.Memo||''}</td><td>${row.Challan||''}</td><td>${row.Account||''}</td></tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('totalCashValue').textContent = '₹' + totalCash.toFixed(2);
            foot.style.display = 'table-footer-group';
        }

        function exportExcel() {
            if (!lastSearchResults.length) { alert('No data'); return; }
            const wsData = [['Date','Sale ID','Customer','Phone','Address','Product','Qty','Rate','MC','Total','Transport','Vehicle','Payment','Memo','Challan','Account']];
            lastSearchResults.forEach(r => wsData.push([r.Date, r['Sale ID'], r.Customer, r.Phone, r.Address, r.Product, r.Qty, r.Rate, r.MC, r.Total, r.Transport, r.Vehicle, r.Payment, r.Memo, r.Challan, r.Account]));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), 'Sales');
            XLSX.writeFile(wb, `JETHWA_BRICKS_HP1_${document.getElementById('searchDate').value}.xlsx`);
        }

        function exportPDF() {
            if (!lastSearchResults.length) { alert('No data'); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const dateStr = document.getElementById('searchDate').value;
            doc.setFontSize(16);
            doc.text(`JETHWA BRICKS INDUSTRY HP-1 · Sales Report (${dateStr})`, 14, 15);
            function addSection(title, dataRows, startY) {
                if (!dataRows.length) return startY;
                doc.setFontSize(14); doc.text(title, 14, startY); startY += 6;
                const headers = [['Date','Sale ID','Customer','Phone','Address','Product','Qty','Rate','MC','Total','Transport','Vehicle','Payment','Memo','Challan','Account']];
                const body = dataRows.map(r => [r.Date, r['Sale ID'], r.Customer, r.Phone, r.Address, r.Product, r.Qty, r.Rate, r.MC, r.Total, r.Transport, r.Vehicle, r.Payment, r.Memo, r.Challan, r.Account]);
                doc.autoTable({ head: headers, body, startY, margin: { left:14, right:14 }, styles: { fontSize:8 }, headStyles: { fillColor: [30,47,111] } });
                return doc.lastAutoTable.finalY + 8;
            }
            let y = 25;
            const cash = lastSearchResults.filter(r => r.Payment === 'Cash');
            const challan = lastSearchResults.filter(r => r.Payment === 'Challan');
            const online = lastSearchResults.filter(r => r.Payment === 'Online');
            y = cash.length ? addSection('1. CASH SALES', cash, y) : (doc.text('1. CASH SALES : No records', 14, y) || y+8);
            y = challan.length ? addSection('2. CHALLAN SALES', challan, y) : (doc.text('2. CHALLAN SALES : No records', 14, y) || y+8);
            online.length ? addSection('3. ONLINE SALES', online, y) : doc.text('3. ONLINE SALES : No records', 14, y);
            doc.save(`JETHWA_BRICKS_HP1_${dateStr}.pdf`);
        }
    </script>
</body>
</html>
